[build]
  command = "pnpm install && pnpm build"
  publish = "dist/public"

# Disable Pretty URLs — prevents Netlify from 301-redirecting /sitemap.xml → /sitemap.xml/
[build.processing]
  skip_processing = false

[build.processing.html]
  pretty_urls = false

# Serve sitemap/robots at trailing-slash URLs as rewrite (200, no redirect)
[[redirects]]
  from = "/sitemap.xml/"
  to = "/sitemap.xml"
  status = 200
  force = true

[[redirects]]
  from = "/robots.txt/"
  to = "/robots.txt"
  status = 200
  force = true

# SPA fallback
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Correct Content-Type headers
[[headers]]
  for = "/sitemap.xml"
  [headers.values]
    Content-Type = "application/xml; charset=utf-8"
    X-Robots-Tag = "noindex"

[[headers]]
  for = "/sitemap.xml/"
  [headers.values]
    Content-Type = "application/xml; charset=utf-8"

[[headers]]
  for = "/robots.txt"
  [headers.values]
    Content-Type = "text/plain; charset=utf-8"
