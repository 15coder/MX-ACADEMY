[build]
  command = "pnpm install && pnpm build"
  publish = "dist/public"

[build.processing.html]
  pretty_urls = false

[[headers]]
  for = "/sitemap.xml"
  [headers.values]
    Content-Type = "application/xml; charset=utf-8"

[[headers]]
  for = "/sitemap.xml/"
  [headers.values]
    Content-Type = "application/xml; charset=utf-8"

[[headers]]
  for = "/robots.txt"
  [headers.values]
    Content-Type = "text/plain; charset=utf-8"

# When Googlebot hits /sitemap.xml/ (trailing slash), serve the XML file directly — no redirect
[[redirects]]
  from   = "/sitemap.xml/"
  to     = "/sitemap.xml"
  status = 200
  force  = true

# SPA fallback — must come last
[[redirects]]
  from = "/*"
  to   = "/index.html"
  status = 200
