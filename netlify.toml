[build]
  command = "pnpm install && pnpm build"
  publish = "dist/public"

# Fix trailing slash on static XML/txt files (Netlify pretty-URLs feature)
[[redirects]]
  from = "/sitemap.xml/"
  to = "/sitemap.xml"
  status = 301
  force = true

[[redirects]]
  from = "/robots.txt/"
  to = "/robots.txt"
  status = 301
  force = true

# SPA fallback
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Correct Content-Type for sitemap and robots
[[headers]]
  for = "/sitemap.xml"
  [headers.values]
    Content-Type = "application/xml; charset=utf-8"

[[headers]]
  for = "/robots.txt"
  [headers.values]
    Content-Type = "text/plain; charset=utf-8"
